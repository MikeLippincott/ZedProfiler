# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    post_checkout:
      - git fetch --unshallow || true
    post_create_environment:
      - pip install uv
    post_install:
      - uv sync --group docs

sphinx:
  configuration: docs/src/conf.py
