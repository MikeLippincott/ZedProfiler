---
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    post_checkout:
      - git fetch --unshallow || true
    post_create_environment:
      - pip install uv
    post_install:
      - uv export --group docs --no-hashes --no-emit-project |
        uv pip install -r -

sphinx:
  builder: html
  configuration: docs/src/conf.py
