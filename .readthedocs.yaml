---
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  commands:
    - git fetch --unshallow || true
    - pip install uv
    - uv sync --group docs
    - >-
      uv run python -m sphinx
      -T -j auto -b html
      -d $READTHEDOCS_OUTPUT/doctrees
      -D language=en
      docs/src
      $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/src/conf.py
